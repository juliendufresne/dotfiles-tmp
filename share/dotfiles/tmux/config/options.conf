# ┌────────────────────────────────────┐
# │         TMUX CONFIG GUIDE          │
# └────────────────────────────────────┘

# This file documents (almost) all default tmux bindings across:
#   - root
#   - prefix
#   - copy-mode (-vi / -emacs)
#   - choose-* tables
#   - mouse bindings
#
# Format:
#   # description (since X.Y, deprecated/removed if applicable)
#   # bind ...
#   # unbind ...


# ─────────────────────────────────────
# Core Concepts
# ─────────────────────────────────────

# set / set-option:
#   set-option -s   → server
#   set-option -g   → global
#   set-option -ga  → append
#   set-option -gw  → window/pane option

# Key tables:
#   root, prefix, copy-mode, copy-mode-vi, copy-mode-emacs
#   choose-tree, choose-buffer, choose-client, choose-window


# ┌────────────────────────────────────┐
# │           SERVER OPTIONS           │
# └────────────────────────────────────┘

# key sent by tmux for backspace
# set-option -s backspace C-?

# buffer limit
set-option -s buffer-limit 100
# recommended: 100–200
# default: 50

# custom aliases for commands
# set-option -s command-alias[] name=value
# default:
#   set-option -s command-alias[0] split-pane=split-window
#   set-option -s command-alias[1] splitp=split-window
#   set-option -s command-alias[2] "server-info=sow-messages -JT"
#   set-option -s command-alias[3] "info=show-messages -JT"
#   set-option -s command-alias[4] "choose-window=choose-tree -w"
#   set-option -s command-alias[5] "choose-session=choose-tree -s"

# command to pipe to if the copy-pipe copy mode command is used without arguments
# set-option -s copy-command ''

# default terminal type
set-option -s default-terminal "tmux-256color"
# recommended: "tmux-256color"
# default: "screen"

# default editor
# set-option -s editor /usr/bin/vi

# escape key timeout (ms)
set-option -s escape-time 50
# recommended: 0–50 for better responsiveness
# default: 10

# exit when no sessions
# set-option -s exit-empty on
# recommended: on

# exit when not attached
# set-option -s exit-unattached off

# extended keys support
set-option -s extended-keys on
# recommended: on (for better key handling in modern terminals)
# default: off

# format for extended keys
# set-option -s extended-keys-format xterm

# focus events support
set-option -s focus-events on
# recommended: on (useful in modern terminals)
# default: off

# history file
# set-option -s history-file ''

# number of error or information messages to save in the message log for each client
# set-option -s message-limit 1000

# time (ms) to wait before dismissing prefix input
# set-option -s prefix-timeout 0

# number of history items to save in the history file for each type of command prompt
# set-option -s prompt-history-limit 100

# clipboard integration
set-option -s set-clipboard on
# recommended: on
# default: external

# terminal features
set-option -sa terminal-features ",xterm-256color:RGB"
# default:
#   set-option -s terminal-features[0] xterm*:clipboard:ccolour:cstyle:focus:title
#   set-option -s terminal-features[1] screen*:title
#   set-option -s terminal-features[2] rxvt*:ignorefkeys
# recommended: ",*:RGB"

# terminal overrides
set-option -sa terminal-overrides ",xterm-256color:Tc"
# default:
#   set-option -s terminal-overrides[0] linux*:AX@
# recommended: ",*:Tc" or modern RGB-capable override

# user defined key escape sequences that can then be bind to execute something
# Example:
# set-option -s user-keys[0] "\e[5;30012~"
# bind User0 resize-pane -L 3

# ┌────────────────────────────────────┐
# │      GLOBAL SESSION OPTIONS        │
# └────────────────────────────────────┘

# Set action on window activity when monitor-activity is on
# set-option -g activity-action other
# options:
#   - any: activity in any window linked to a session causes a bell of message (depending on visual-activity) in the current window of that session
#   - none: all activity is ignored
#   - current: only activity windows other than the current window are ignored
#   - other: activity in the current window is ignored but not those in other windows

# assume paste timing
# set-option -s assume-paste-time 1
# recommended: 1–50 depending on paste behavior

# base index for windows - 1 is more human-friendly and match keyboard layout
set-option -g base-index 1
# default: 0

# Set action on a bell in a window when monitor-bell is on. The values are the same as those for activity-action
set-option -g bell-action none
# recommended: none or current (less noisy)
# default: any

# default command and default shell
# tmux reads default-shell only when the server starts, so we set it here as the
# INITIAL pane shell (fish): the first window of a fresh server starts before any
# rc has run, so it would otherwise fall back to $SHELL (the login shell). The
# per-shell block in .bashrc/.zshrc then re-points default-shell at runtime to
# whichever shell is actually in use, so the choice tracks the current shell.
#
# Probe the common fish locations: Linux (/usr/bin), Homebrew x86 Mac
# (/usr/local/bin), Apple Silicon Mac (/opt/homebrew/bin). If fish is installed
# nowhere, none match and tmux falls back to $SHELL.
if-shell "test -x /usr/local/bin/fish" "set -g default-shell /usr/local/bin/fish"
if-shell "test -x /opt/homebrew/bin/fish" "set -g default-shell /opt/homebrew/bin/fish"
if-shell "test -x /usr/bin/fish" "set -g default-shell /usr/bin/fish"
# default-command stays unset so the rc block can re-point default-shell.
# default-command default: ''
# default-shell recommended: $SHELL or /bin/bash or /bin/zsh

# default size
# set-option -g default-size 80x24

# destroy unattached sessions
# set-option -g destroy-unattached off
# options:
#   on: destroy the session after the last client has detached
#   off: leave the session or‐phaned.
#   keep-last: destroy the session only if it is in a group and has other sessions in that group.
#   keep-group: destroy the session unless it is in a group and is the only session in that group.
# recommended: off

# set-option -g detach-on-destroy on
# recommended: on
# options:
#   on: the client is detached when the session it is attached to is  destroyed.
#   off:  the client  is switched to the most recently active of the remaining sessions.
#   no-detached: the client is de‐tached only if there are no detached sessions
#                if detached sessions exist, the client is switched to the most recently active.
#   previous or next: the client is switched to the previous or next session in alphabetical order.

# Set the time in milliseconds for which the indicators shown by the display-panes command appear.
# set-option -g display-panes-time 1000

# Set the amount of time for which status line messages and other on-screen indicators are displayed.
# If  set to 0, messages and indicators are displayed until a key is pressed.  time is in milliseconds.
# set-option -g display-time 2500
# recommended: 1500–3000 for readability

# Set  the maximum number of lines held in window history.
# This setting applies only to new windows - existing window histories are not resized
# and retain the limit at the point they were created.
set-option -g history-limit 50000
# recommended: 10000–50000 for modern usage
# default: 2000

# Set the default key table to key-table instead of root.
# set-option -g key-table root

# Lock the session (like the lock-session command) after number seconds of inactivity.
# 0 means no lock
# set-option -g lock-after-time 0
# recommended: 0 (disabled)

# Command to run when locking each client.
# set-option -g lock-command "lock -np"
# recommended: "vlock" or custom script

# mouse support
set-option -g mouse on
# recommended: on
# default: off

# prefix key
# set-option -g prefix C-b

# secondary prefix
# set-option -g prefix2 None
# recommended: (none)

# renumber windows automatically
set-option -g renumber-windows on
# recommended: on (cleaner UX)
# default: off

# set-option -g repeat-time 500
# recommended: 300–600 depending on keyboard feel

# set titles
set-option -g set-titles on
# recommended: on (useful in terminal tabs)
# default: off

# Set  action  on  window  silence  when  monitor-silence  is  on.
# set-option -g silence-action other
# options:
#   - any: activity in any window linked to a session causes a bell of message (depending on visual-activity) in the current window of that session
#   - none: all activity is ignored
#   - current: only activity windows other than the current window are ignored
#   - other: activity in the current window is ignored but not those in other windows

set-option -g status-keys vi
# default: emacs

# set-option -g update-environment[0] DISPLAY
# set-option -g update-environment[1] KRB5CCNAME
# set-option -g update-environment[2] SSH_ASKPASS
# set-option -g update-environment[3] SSH_AUTH_SOCK
# set-option -g update-environment[4] SSH_AGENT_PID
# set-option -g update-environment[5] SSH_CONNECTION
# set-option -g update-environment[6] WINDOWID
# set-option -g update-environment[7] XAUTHORITY

set-option -g visual-activity on
# default: off
# options: [on | off | both]

# visual bell
# set-option -g visual-bell off
# recommended: off (use system bell instead)

# set-option -g visual-silence off

# set-option -g word-separators "!\"#$%&'()*+,-./:;<=>?@[\\]^`{|}~"
# recommended: include "/.:" for paths

# ┌────────────────────────────────────┐
# │       GLOBAL WINDOW OPTIONS        │
# └────────────────────────────────────┘

# aggressive-resize [on | off]
#        Aggressively resize the chosen window.  This means that tmux will resize the window to the size of the small‐
#        est or largest session (see the window-size option) for which it is the current window, rather than the  ses‐
#        sion  to  which it is attached.  The window may resize when the current window is changed on another session;
#        this option is good for full-screen programs which support SIGWINCH and poor for interactive programs such as
#        shells.
#
# set-option -gw aggressive-resize off
# recommended: off


# automatic-rename [on | off]
#        Control automatic window renaming.  When this setting is enabled, tmux will rename the  window  automatically
#        using the format specified by automatic-rename-format.  This flag is automatically disabled for an individual
#        window  when  a name is specified at creation with new-window or new-session, or later with rename-window, or
#        with a terminal escape sequence.  It may be switched off globally with:
#
#            set-option -wg automatic-rename off
#
# set-option -g automatic-rename on
# recommended: on

# clock-mode-style [12 | 24]
#        Set clock hour format.
#
# set-option -gw clock-mode-style 24
# recommended: 24 or 12 depending on locale

# mode-keys [vi | emacs]
#         Use  vi  or  emacs-style  key  bindings in copy mode.  The default is emacs, unless VISUAL or EDITOR contains
#         ‘vi’.
set-option -gw mode-keys vi
# default: emacs

# monitor-activity [on | off]
#         Monitor for activity in the window.  Windows with activity are highlighted in the status line.
set-option -gw monitor-activity on
# default: off
# recommended: on (useful for long sessions)

# monitor-bell [on | off]
#         Monitor for a bell in the window.  Windows with a bell are highlighted in the status line.

# monitor-silence [interval]
#        Monitor for silence (no activity) in the window within interval seconds.  Windows that have been  silent  for
#        the interval are highlighted in the status line.  An interval of zero disables the monitoring.
# monitor silence
# set-option -gw monitor-silence 0
# recommended: off unless debugging

# pane-base-index index
# 		Like base-index, but set the starting index for pane numbers.
set-option -gw pane-base-index 1
# default: 0
# recommended: 1

# wrap-search [on | off]
#         If this option is set, searches will wrap around the end of the pane contents.  The default is on.
# set-option -gw wrap-search on


# ┌────────────────────────────────────┐
# │           PANE OPTIONS             │
# └────────────────────────────────────┘
# allow-passthrough [on | off | all]
#         Allow programs in the pane to bypass tmux using a terminal escape sequence (\ePtmux;...\e\\).  If set to  on,
#         passthrough  sequences will be allowed only if the pane is visible.  If set to all, they will be allowed even
#         if the pane is invisible.
# set-option -g allow-passthrough off

# allow-rename [on | off]
#         Allow programs in the pane to change the window name using a terminal escape sequence (\ek...\e\\).
# allow rename
# set-option -gw allow-rename off
# recommended: off or on depending on workflow

# allow-set-title [on | off]
#         Allow programs in the pane to  change  the  title  using  the  terminal  escape  sequences  (\e]2;...\e\\  or
#         \e]0;...\e\\).

# alternate-screen [on | off]
#         This  option  configures  whether programs running inside the pane may use the terminal alternate screen fea‐
#         ture, which allows the smcup and rmcup terminfo(5) capabilities.  The alternate screen feature preserves  the
#         contents  of  the  window  when an interactive application starts and restores it on exit, so that any output
#         visible before the application starts reappears unchanged after it exits.

# remain-on-exit [on | off | failed]
#         A pane with this flag set is not destroyed when the program running in it exits.  If set to failed, then only
#         when the program exit status is not zero.  The pane may be reactivated with the respawn-pane command.
# set-option -gw remain-on-exit off
# recommended: off

# remain-on-exit-format string
#         Set the text shown at the bottom of exited panes when remain-on-exit is enabled.

# scroll-on-clear [on | off]
#         When the entire screen is cleared and this option is on, scroll the contents of the screen into  history  be‐
#         fore clearing it.

# synchronize-panes [on | off]
#         Duplicate  input  to all other panes in the same window where this option is also on (only for panes that are
#         not in any mode).
# set-option -gw synchronize-panes off
# recommended: off (dangerous when on accidentally)
