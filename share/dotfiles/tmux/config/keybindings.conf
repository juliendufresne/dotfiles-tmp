# ┌────────────────────────────────────┐
# │           ROOT TABLE               │
# └────────────────────────────────────┘

# send prefix key to application
# bind -n C-b send-prefix
# unbind -n C-b

# resize pane via mouse drag (since 2.1)
# bind -n MouseDrag1Pane resize-pane -M
# unbind -n MouseDrag1Pane


# ┌────────────────────────────────────┐
# │          PREFIX TABLE              │
# └────────────────────────────────────┘

# --- Sessions ---

# detach client
# bind d detach-client
# unbind d

# choose session tree (since 2.4)
# bind s choose-tree -s
# unbind s


# --- Windows ---

# new window
# bind c new-window
# unbind c

# kill window
# bind & kill-window
# unbind &

# rename window
# bind , command-prompt -I "#W" "rename-window '%%'"
# unbind ,

# next window
# bind n next-window
# unbind n

# previous window
# bind p previous-window
# unbind p

# last window
# bind l last-window
# unbind l

# choose window
# bind w choose-window
# unbind w


# --- Panes ---

# command split-window extra options:
#   -c "#{pane_current_path}"   # start in same directory
#   -l 20                       # fixed size
#   -f                          # full width/height

# split horizontally
bind -n M-n split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
unbind %
# default: bind % split-window -h

# split vertically
bind -n M-N split-window -v -c "#{pane_current_path}"
bind | split-window -v -c "#{pane_current_path}"
unbind '"'
# default: bind '"' split-window -v

# kill pane
# bind x kill-pane
# unbind x

# toggle zoom (since 1.8)
# bind z resize-pane -Z
# unbind z

# break pane
# bind ! break-pane
# unbind !

# last pane
# bind ; last-pane
# unbind ;

# swap pane up
# bind { swap-pane -U
# unbind {

# swap pane down
# bind } swap-pane -D
# unbind }


# --- Navigation ---

# pane left
bind -n M-Left select-pane -L
unbind Left
# default: bind Left select-pane -L

# pane right
bind -n M-Right select-pane -R
unbind Right
# default: bind Right select-pane -R

# pane up
bind -n M-Up select-pane -U
# unbind Up
# default: bind Up select-pane -U

# pane down
bind -n M-Down select-pane -D
unbind Down
# default: bind Down select-pane -D


# --- Resize ---

# resize left (repeatable)
# bind -r Left resize-pane -L 5
# unbind -r Left

# resize right (repeatable)
# bind -r Right resize-pane -R 5
# unbind -r Right

# resize up (repeatable)
# bind -r Up resize-pane -U 5
# unbind -r Up

# resize down (repeatable)
# bind -r Down resize-pane -D 5
# unbind -r Down


# --- Copy Mode ---

# enter copy mode
#bind [ copy-mode
#unbind [

# paste buffer
# bind ] paste-buffer
# unbind ]


# --- Misc ---

# display panes
# bind q display-panes
# unbind q

# command prompt
# bind : command-prompt
# unbind :

# reload config
bind r source-file ~/.tmux.conf
# unbind r

# clock mode
bind t clock-mode
# unbind t


# ┌────────────────────────────────────┐
# │        COPY MODE (VI)              │
# └────────────────────────────────────┘

# cursor up (since 2.4)
# bind -T copy-mode-vi k cursor-up
# unbind -T copy-mode-vi k

# cursor down (since 2.4)
# bind -T copy-mode-vi j cursor-down
# unbind -T copy-mode-vi j

# cursor left (since 2.4)
# bind -T copy-mode-vi h cursor-left
# unbind -T copy-mode-vi h

# cursor right (since 2.4)
# bind -T copy-mode-vi l cursor-right
# unbind -T copy-mode-vi l

# begin selection (since 2.4)
# bind -T copy-mode-vi v begin-selection
# unbind -T copy-mode-vi v

# copy selection (since 2.4)
# bind -T copy-mode-vi y copy-selection
# unbind -T copy-mode-vi y

# rectangle toggle (since 2.4)
# bind -T copy-mode-vi C-v rectangle-toggle
# unbind -T copy-mode-vi C-v

# search forward (since 2.4)
# bind -T copy-mode-vi / search-forward
# unbind -T copy-mode-vi /

# search backward (since 2.4)
# bind -T copy-mode-vi ? search-backward
# unbind -T copy-mode-vi ?


# ┌────────────────────────────────────┐
# │     COPY MODE (EMACS)              │
# └────────────────────────────────────┘

# cursor up (since 2.4)
# bind -T copy-mode-emacs C-p cursor-up
# unbind -T copy-mode-emacs C-p

# cursor down (since 2.4)
# bind -T copy-mode-emacs C-n cursor-down
# unbind -T copy-mode-emacs C-n

# begin selection (since 2.4)
# bind -T copy-mode-emacs C-Space begin-selection
# unbind -T copy-mode-emacs C-Space

# copy selection (since 2.4)
# bind -T copy-mode-emacs M-w copy-selection
# unbind -T copy-mode-emacs M-w


# ┌────────────────────────────────────┐
# │        CHOOSE BUFFER               │
# └────────────────────────────────────┘

# select buffer (since 2.4)
# bind -T choose-buffer Enter choose-buffer
# unbind -T choose-buffer Enter

# delete buffer (since 2.4)
# bind -T choose-buffer d delete-buffer
# unbind -T choose-buffer d


# ┌────────────────────────────────────┐
# │        CHOOSE CLIENT               │
# └────────────────────────────────────┘

# select client (since 2.4)
# bind -T choose-client Enter choose-client
# unbind -T choose-client Enter


# ┌────────────────────────────────────┐
# │        CHOOSE WINDOW               │
# └────────────────────────────────────┘

# select window (since 2.4)
# bind -T choose-window Enter choose-window
# unbind -T choose-window Enter


# ┌────────────────────────────────────┐
# │           MOUSE BINDINGS           │
# └────────────────────────────────────┘

# select pane on click (since 2.1)
# bind -n MouseDown1Pane select-pane
# unbind -n MouseDown1Pane

# resize pane via drag (since 2.1)
# bind -n MouseDrag1Pane resize-pane -M
# unbind -n MouseDrag1Pane

# scroll up (since 2.1)
# bind -n WheelUpPane copy-mode -e
# unbind -n WheelUpPane

# scroll down (since 2.1)
# bind -n WheelDownPane send-keys -M
# unbind -n WheelDownPane

