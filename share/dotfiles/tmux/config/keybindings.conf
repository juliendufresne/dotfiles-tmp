# ┌────────────────────────────────────┐
# │         TMUX CONFIG GUIDE          │
# └────────────────────────────────────┘

# This file documents (almost) all default tmux bindings across:
#   - root
#   - prefix
#   - copy-mode (-vi / -emacs)
#   - choose-* tables
#   - mouse bindings
#
# Format:
#   # description (since X.Y, deprecated/removed if applicable)
#   # bind ...
#   # unbind ...


# ─────────────────────────────────────
# Core Concepts
# ─────────────────────────────────────

# bind-key / bind
# bind -n → no prefix
# bind -T → key table

# set / set-option:
#   set -g   → global
#   set -ga  → append
#   setw -g  → window option

# Key tables:
#   root, prefix, copy-mode, copy-mode-vi, copy-mode-emacs
#   choose-tree, choose-buffer, choose-client, choose-window


# ─────────────────────────────────────
# Filter modified bindings
# ─────────────────────────────────────

