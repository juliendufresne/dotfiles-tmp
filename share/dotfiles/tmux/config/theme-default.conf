
# ┌────────────────────────────────────┐
# │          THEME OPTIONS             │
# └────────────────────────────────────┘

set -g display-panes-active-colour red
set -g display-panes-colour blue

#  Set status line message command style.
#  This is used for the command prompt with vi(1) keys when in command mode.
set -g message-command-style bg=black,fg=yellow

# Set  status  line  message  style.
# This is used for messages and for the command prompt.
set -g message-style bg=yellow,fg=black


set -g message-line 0
set -g set-titles off

# status bar visibility
set -g status on


set -g status-bg default
set -g status-fg default
set -g status-format[0] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?window_end_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?window_end_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
set -g status-format[1] "#[align=centre]#{P:#{?pane_active,#[reverse],}#{pane_index}[#{pane_width}x#{pane_height}]#[default] }"

# status update interval
set -g status-interval 15
# recommended: 5-10 for dynamic status

set -g status-justify left

# status left content
set -g status-left "[#{session_name}] "
# recommended: session name + host info

set -g status-left-length 10
set -g status-left-style default

# status position
set -g status-position bottom
# recommended: bottom

# status right content
set -g status-right "#[fg=#464f62]#{online_status} #[fg=#464f62]%R"
# recommended: date + battery + time

set -g status-right-length 90
set -g status-right-style default

# status style
set -g status-style "bg=#2e3440"
# recommended: dark them (bg=black/grey)

set-titles-string "#S:$I:$W - \"#T\" #{session_alerts}"

# window status format
# setw -g window-status-format "#I:#W"
# recommended: "#I:#W#F"

# current window format
# setw -g window-status-current-format "#I:#W#F"
# recommended: highlight active window

# window status style
# setw -g window-status-style "fg=default"
# recommended: subtle dim theme

# current window style
# setw -g window-status-current-style "fg=white,bg=blue"
# recommended: bold highlight style

# window activity style
# setw -g window-status-activity-style "fg=yellow"
# recommended: yellow or orange

# window bell style
# setw -g window-status-bell-style "fg=red"
# recommended: red (default is fine)
# pane active border style
# set -g pane-active-border-style "fg=green"
# recommended: modern color theme (cyan/green)

# pane border format
# set -g pane-border-format "#{pane_index}"
# recommended: "#{pane_index} #{pane_title}"

# pane border style
# set -g pane-border-style "fg=default"
# recommended: subtle grey


# automatic-rename-format format
#        The format (see “FORMATS”) used when the automatic-rename option is enabled.
#
# set -g automatic-rename-format "#{pane_current_command}"
# recommended: "#{pane_current_path}"
#

# clock-mode-colour colour
#        Set clock colour.
#
# setw -g clock-mode-colour 

# fill-character character
#        Set the character used to fill areas of the terminal unused by a window.
# setw -g fille-character

# main-pane-height height
# main-pane-width width
#         Set the width or height of the main (left or top)  pane  in  the  main-horizontal,  main-horizontal-mirrored,
#         main-vertical,  or  main-vertical-mirrored  layouts.   If suffixed by ‘%’, this is a percentage of the window
#         size.

# copy-mode-match-style style
#         Set the style of search matches in copy mode.  For how to specify style, see the “STYLES” section.
#
# copy-mode-mark-style style
#         Set the style of the line containing the mark in copy mode.  For how to specify style, see the “STYLES”  section.
#
# copy-mode-current-match-style style
#         Set the style of the current search match in copy mode.  For how to specify style, see the “STYLES” section.
# mode-style style
#         Set window modes style.  For how to specify style, see the “STYLES” section.

# other-pane-height height
# 		Set  the  height  of  the other panes (not the main pane) in the main-horizontal and main-horizontal-mirrored
# 		layouts.  If this option is set to 0 (the default), it will have no effect.  If both the main-pane-height and
# 		other-pane-height options are set, the main pane will grow taller to  make  the  other  panes  the  specified
# 		height, but will never shrink to do so.  If suffixed by ‘%’, this is a percentage of the window size.

# other-pane-width width
# 		Like other-pane-height, but set the width of other panes in the main-vertical and main-vertical-mirrored lay‐
# 		outs.

# pane-active-border-style style
# 		Set the pane border style for the currently active pane.  For how to specify style, see the “STYLES” section.
# 		Attributes are ignored.

# pane-border-format format
# 		Set the text shown in pane border status lines.

# pane-border-indicators [off | colour | arrows | both]
# 		Indicate  active  pane  by colouring only half of the border in windows with exactly two panes, by displaying
# 		arrow markers, by drawing both or neither.

# pane-border-lines type
# 		Set the type of characters used for drawing pane borders.  type may be one of:
#
# 		single  single lines using ACS or UTF-8 characters
#
# 		double  double lines using UTF-8 characters
#
# 		heavy   heavy lines using UTF-8 characters
#
# 		simple  simple ASCII characters
#
# 		number  the pane number
#
# 		‘double’ and ‘heavy’ will fall back to standard ACS line drawing when UTF-8 is not supported.
# set-option -gw pane-border-lines single
# recommended: rounded or heavy (modern terminals)

# pane-border-status [off | top | bottom]
# 		Turn pane border status lines off or set their position.
# set-option -gw pane-border-status off
# recommended: top (useful UI improvement)

# pane-border-style style
# 		Set the pane border style for panes aside from the active pane.  For how to specify style, see  the  “STYLES”
# 		section.  Attributes are ignored.

# popup-style style
# 		Set the popup style.  See the “STYLES” section on how to specify style.  Attributes are ignored.

# popup-border-style style
# 		Set the popup border style.  See the “STYLES” section on how to specify style.  Attributes are ignored.

# popup-border-lines type
#         Set the type of characters used for drawing popup borders.  type may be one of:
#         single  single lines using ACS or UTF-8 characters (default)
#         rounded
#                 variation of single with rounded corners using UTF-8 characters
#         double  double lines using UTF-8 characters
#         heavy   heavy lines using UTF-8 characters
#         simple  simple ASCII characters
#         padded  simple ASCII space character
#         none    no border
#         ‘double’ and ‘heavy’ will fall back to standard ACS line drawing when UTF-8 is not supported.

# window-status-activity-style style
#         Set  status  line  style for windows with an activity alert.  For how to specify style, see the “STYLES” sec‐
#         tion.

# window-status-bell-style style
#         Set status line style for windows with a bell alert.  For how to specify style, see the “STYLES” section.

# window-status-current-format string
#         Like window-status-format, but is the format used when the window is the current window.

# window-status-current-style style
#         Set status line style for the currently active window.  For how to specify style, see the “STYLES” section.

# window-status-format string
#         Set the format in which the window is displayed in the status  line  window  list.   See  the  “FORMATS”  and
#         “STYLES” sections.

# window-status-last-style style
#         Set status line style for the last active window.  For how to specify style, see the “STYLES” section.

# window-status-separator string
#         Sets the separator drawn between windows in the status line.  The default is a single space character.

# window-status-style style
#         Set status line style for a single window.  For how to specify style, see the “STYLES” section.

# window-size largest | smallest | manual | latest
#         Configure  how  tmux determines the window size.  If set to largest, the size of the largest attached session
#         is used; if smallest, the size of the smallest.  If manual, the  size  of  a  new  window  is  set  from  the
#         default-size  option  and  windows  are resized automatically.  With latest, tmux uses the size of the client
#         that had the most recent activity.  See also the resize-window command and the aggressive-resize option.

# cursor-colour colour
#         Set the colour of the cursor.

# pane-colours[] colour
#         The default colour palette.  Each entry in the array defines the colour tmux uses when the colour  with  that
#         index is requested.  The index may be from zero to 255.

# cursor-style style
#         Set  the  style  of  the  cursor.   Available styles are: default, blinking-block, block, blinking-underline,
#         underline, blinking-bar, bar.

# window-active-style style
#         Set the pane style when it is the active pane.  For how to specify style, see the “STYLES” section.

# window-style style
#         Set the pane style.  For how to specify style, see the “STYLES” section.

